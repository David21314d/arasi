<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TeclaLux · Mode Aprenentatge Professional</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --bg: #05070a;
    --surface-elevated: #0c0f14;
    --surface-card: #11161d;
    --border-subtle: #1e2a32;
    --border-active: #2dd4bf;
    --accent: #2dd4bf;
    --accent-glow: rgba(45, 212, 191, 0.3);
    --accent-soft: #1a3a3a;
    --text-primary: #edf2f8;
    --text-secondary: #8e9eae;
    --text-muted: #4b5568;
    --red-error: #f97373;
    --amber-warning: #fbbf24;
    --success: #4ade80;
    --transition-fast: 0.15s cubic-bezier(0.2, 0, 0, 1);
  }

  body {
    background: var(--bg);
    font-family: 'Inter', sans-serif;
    color: var(--text-primary);
    line-height: 1.5;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    background-image: radial-gradient(circle at 10% 20%, rgba(45,212,191,0.03) 0%, rgba(0,0,0,0) 70%);
  }

  /* Main container */
  .app {
    max-width: 720px;
    width: 100%;
    margin: 0 auto;
  }

  /* Headers & branding */
  .brand {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
    gap: 0.5rem;
  }

  .logo-area {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 44px;
    height: 44px;
    background: linear-gradient(135deg, #2dd4bf, #0f766e);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    box-shadow: 0 8px 20px rgba(45,212,191,0.2);
  }

  .title h2 {
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: -0.3px;
    background: linear-gradient(120deg, #ffffff, #a5f3e8);
    background-clip: text;
    -webkit-background-clip: text;
    color: transparent;
  }

  .title p {
    font-size: 0.75rem;
    color: var(--text-secondary);
    letter-spacing: 0.4px;
  }

  .status-pill {
    background: rgba(30, 42, 50, 0.6);
    backdrop-filter: blur(8px);
    padding: 0.3rem 1rem;
    border-radius: 40px;
    font-size: 0.75rem;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 6px;
    border: 1px solid var(--border-subtle);
  }

  .led-dot {
    width: 10px;
    height: 10px;
    border-radius: 10px;
    background: #4b5568;
    transition: all 0.2s;
  }

  .led-dot.connected {
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: pulse-glow 1.8s infinite;
  }

  @keyframes pulse-glow {
    0% { opacity: 0.6; box-shadow: 0 0 0 0 var(--accent-glow); }
    100% { opacity: 1; box-shadow: 0 0 0 4px transparent; }
  }

  /* Cards */
  .card {
    background: var(--surface-card);
    border: 1px solid var(--border-subtle);
    border-radius: 28px;
    padding: 1.5rem;
    margin-bottom: 1.25rem;
    backdrop-filter: blur(0px);
    transition: transform 0.1s ease;
  }

  .card-header {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 1.25rem;
    font-weight: 600;
    font-size: 0.9rem;
    letter-spacing: 0.3px;
    color: var(--text-secondary);
    border-bottom: 1px solid var(--border-subtle);
    padding-bottom: 0.75rem;
  }

  .card-header span {
    font-size: 1.2rem;
  }

  /* Botons principals */
  .btn-primary {
    background: var(--accent);
    border: none;
    width: 100%;
    padding: 0.9rem;
    border-radius: 48px;
    font-weight: 700;
    font-size: 0.95rem;
    font-family: inherit;
    color: #031013;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }

  .btn-primary:hover {
    background: #2bc5b0;
    transform: translateY(-1px);
    box-shadow: 0 8px 20px rgba(45,212,191,0.25);
  }

  .btn-secondary {
    background: rgba(30, 42, 50, 0.8);
    border: 1px solid var(--border-subtle);
    color: var(--text-primary);
    padding: 0.7rem 1.2rem;
    border-radius: 40px;
    font-weight: 500;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
    backdrop-filter: blur(4px);
  }

  .btn-secondary:hover {
    border-color: var(--accent);
    background: rgba(45,212,191,0.1);
    color: var(--accent);
  }

  .btn-outline-danger {
    background: transparent;
    border: 1px solid #4a2a2e;
    color: #f9a8a8;
    border-radius: 40px;
    padding: 0.7rem 1rem;
    font-weight: 500;
    font-size: 0.8rem;
    cursor: pointer;
  }

  .btn-outline-danger:hover {
    background: rgba(249, 115, 115, 0.1);
    border-color: #f97373;
  }

  .action-bar {
    display: flex;
    gap: 12px;
    margin-top: 12px;
    flex-wrap: wrap;
  }

  /* Llista cançons */
  .song-grid {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin: 16px 0 8px;
  }

  .song-card {
    background: var(--surface-elevated);
    border-radius: 24px;
    padding: 0.9rem 1.2rem;
    border: 1px solid var(--border-subtle);
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .song-card:hover {
    border-color: var(--accent);
    background: rgba(45,212,191,0.04);
    transform: translateX(4px);
  }

  .song-card.selected {
    border-color: var(--accent);
    background: linear-gradient(90deg, rgba(45,212,191,0.08), rgba(0,0,0,0));
    box-shadow: 0 0 0 1px rgba(45,212,191,0.3);
  }

  .song-info h4 {
    font-weight: 600;
    font-size: 1rem;
  }

  .song-info p {
    font-size: 0.7rem;
    color: var(--text-muted);
  }

  .badge-notes {
    background: var(--accent-soft);
    padding: 4px 10px;
    border-radius: 30px;
    font-size: 0.7rem;
    font-weight: 500;
    color: var(--accent);
  }

  /* Control de reproducció */
  .now-playing {
    background: var(--surface-elevated);
    border-radius: 32px;
    padding: 1.2rem;
    margin-bottom: 1rem;
  }

  .big-note {
    font-family: 'JetBrains Mono', monospace;
    font-size: 3rem;
    font-weight: 700;
    text-align: center;
    letter-spacing: 2px;
    color: var(--accent);
    text-shadow: 0 0 6px rgba(45,212,191,0.4);
    margin-bottom: 0.5rem;
  }

  .progress-section {
    display: flex;
    justify-content: space-between;
    font-size: 0.7rem;
    color: var(--text-secondary);
    margin-bottom: 6px;
  }

  .progress-bar-bg {
    height: 5px;
    background: var(--border-subtle);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 1rem;
  }

  .progress-fill {
    width: 0%;
    height: 100%;
    background: var(--accent);
    border-radius: 10px;
    transition: width 0.2s ease;
  }

  .transport-buttons {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 12px;
  }

  .icon-btn {
    background: rgba(30, 42, 50, 0.6);
    border: none;
    font-size: 1.6rem;
    padding: 12px;
    border-radius: 60px;
    width: 56px;
    cursor: pointer;
    transition: 0.1s;
    color: var(--text-primary);
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }

  .icon-btn:active {
    transform: scale(0.96);
  }

  .icon-btn.primary-action {
    background: var(--accent);
    color: #031013;
    box-shadow: 0 4px 12px rgba(45,212,191,0.3);
  }

  /* Teclat visual (LED strip) */
  .keyboard-strip {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 6px;
    margin-top: 16px;
  }

  .virtual-key {
    background: #0f141c;
    border-radius: 12px;
    padding: 8px 0;
    min-width: 44px;
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    font-weight: 500;
    border: 1px solid #1f2c36;
    transition: all 0.1s;
    color: #7790a5;
  }

  .virtual-key.lit {
    background: var(--accent);
    border-color: var(--accent);
    color: #021a1c;
    box-shadow: 0 0 12px var(--accent);
    transform: scale(1.02);
  }

  /* Control velocitat */
  .speed-slider-container {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-top: 16px;
    background: var(--surface-elevated);
    padding: 0.6rem 1rem;
    border-radius: 60px;
  }
  input[type="range"] {
    flex: 1;
    height: 4px;
    -webkit-appearance: none;
    background: var(--border-subtle);
    border-radius: 4px;
  }
  input[type="range"]:focus {
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    background: var(--accent);
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 0 4px var(--accent);
  }

  /* Seccions ocultables */
  .hidden-section {
    display: none;
  }

  /* Responsive */
  @media (max-width: 560px) {
    .card {
      padding: 1.2rem;
    }
    .big-note {
      font-size: 2.2rem;
    }
    .transport-buttons {
      gap: 12px;
    }
    .virtual-key {
      min-width: 36px;
      font-size: 0.65rem;
    }
  }
</style>
</head>
<body>
<div class="app">
  <div class="brand">
    <div class="logo-area">
      <div class="logo-icon">🔹</div>
      <div class="title">
        <h2>TeclaLux·Studio</h2>
        <p>Interactive learning · LED feedback</p>
      </div>
    </div>
    <div class="status-pill" id="connectionStatusPill">
      <div class="led-dot" id="statusLed"></div>
      <span id="statusText">Desconnectat</span>
    </div>
  </div>

  <!-- PANEL DE CONNEXIÓ (només es veu si no connectat) -->
  <div id="connectPanel" class="card">
    <div class="card-header"><span>🔌</span> Connexió ESP32</div>
    <button class="btn-primary" id="connectBtn">⚡ Connectar TeclaLux</button>
    <p style="font-size: 0.7rem; margin-top: 12px; color: var(--text-muted); text-align: center;">Busca el dispositiu "TeclatMusical" — Bluetooth actiu</p>
  </div>

  <!-- PANEL PRINCIPAL (visió global després de connectar) -->
  <div id="mainPanel" style="display: none;">
    <!-- Selecció cançons + controls extra -->
    <div class="card">
      <div class="card-header"><span>🎼</span> Biblioteca d'aprenentatge</div>
      <div id="songsContainer" class="song-grid"></div>
      <label class="upload-zone" style="display: flex; align-items: center; justify-content: space-between; background: var(--surface-elevated); border-radius: 60px; padding: 10px 18px; margin-top: 12px; cursor: pointer; border: 1px dashed var(--border-subtle);">
        <span style="font-size: 0.8rem;">📂 Pujar MIDI</span>
        <input type="file" id="midiFileInput" accept=".mid,.midi" style="display: none;">
        <span style="color: var(--accent);">+</span>
      </label>
      <div class="action-bar">
        <button id="backToSongsBtn" class="btn-secondary">↺ Torna a cançons</button>
        <button id="disconnectBtn" class="btn-outline-danger">🔌 Desconnectar placa</button>
      </div>
    </div>

    <!-- Panell dinàmic: reproductor + tecles LED + velocitat -->
    <div id="learningPlayer" class="card" style="padding: 1rem;">
      <div class="now-playing">
        <div class="big-note" id="currentNoteLabel">—</div>
        <div class="progress-section">
          <span id="progressCounter">0 / 0</span>
          <span id="instructionHint">🎯 Prem la nota il·luminada</span>
        </div>
        <div class="progress-bar-bg"><div class="progress-fill" id="progressFillSong"></div></div>
        <div class="transport-buttons">
          <button class="icon-btn" id="playPauseBtn" disabled>▶</button>
          <button class="icon-btn" id="resetSongBtn" disabled>↺</button>
        </div>
      </div>

      <!-- Teclat visual LED (simulació tecles) -->
      <div id="visualKeyboard" class="keyboard-strip"></div>

      <!-- control velocitat -->
      <div class="speed-slider-container">
        <span style="font-size:0.7rem;">⚡ velocitat</span>
        <input type="range" id="speedRange" min="0.5" max="2.5" step="0.1" value="1.0">
        <span id="speedValue" style="font-family: monospace; min-width: 42px;">1.0x</span>
      </div>
      <p style="font-size: 0.65rem; text-align: center; margin-top: 12px; color: var(--text-muted);">✨ Els LEDs físics s'encenen a l'ESP32 — toca la nota correcta per avançar</p>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/midi-parser-js@4.0.6/src/midi-parser.js"></script>
<script>
  // ---------- CONSTANTS NOTES (blanques) ----------
  const NOTES_BLANQUES = [
    'DO4','RE4','MI4','FA4','SOL4','LA4','SI4',
    'DO5','RE5','MI5','FA5','SOL5','LA5','SI5',
    'DO6','RE6','MI6','FA6','SOL6','LA6','SI6','DO7'
  ];
  const MIDI_BASE = {0:'DO',1:'DO#',2:'RE',3:'RE#',4:'MI',5:'FA',6:'FA#',7:'SOL',8:'SOL#',9:'LA',10:'LA#',11:'SI'};
  const BLANQUES_SET = new Set(['DO','RE','MI','FA','SOL','LA','SI']);
  const MIDI_A_NOTA = {};
  for (let midi = 48; midi <= 96; midi++) {
    const nom = MIDI_BASE[midi % 12];
    const octava = Math.floor(midi / 12) - 1;
    if (BLANQUES_SET.has(nom)) {
      const notaCompleta = nom + octava;
      if (NOTES_BLANQUES.includes(notaCompleta)) MIDI_A_NOTA[midi] = notaCompleta;
    }
  }

  // ----- ESTAT GLOBAL -----
  let btDevice = null, btChar = null;
  let connected = false;
  let currentSong = null;           // { nom, autor, notes: [{nota, dur}] }
  let seqNotes = [];
  let currentIdx = 0;
  let isPlaying = false;
  let waitingForOk = false;
  let tempoMultiplier = 1.0;
  let currentLedIndex = -1;

  // Cançons predefinides
  let CANCONS_PRESET = [
    { nom: 'Cumpleaños Feliz', autor: 'Tradicional', notes: [
      {nota:'DO4',dur:400},{nota:'DO4',dur:200},{nota:'RE4',dur:600},{nota:'DO4',dur:600},{nota:'FA4',dur:600},{nota:'MI4',dur:1200},
      {nota:'DO4',dur:400},{nota:'DO4',dur:200},{nota:'RE4',dur:600},{nota:'DO4',dur:600},{nota:'SOL4',dur:600},{nota:'FA4',dur:1200},
      {nota:'DO4',dur:400},{nota:'DO4',dur:200},{nota:'DO5',dur:600},{nota:'LA4',dur:600},{nota:'FA4',dur:600},{nota:'MI4',dur:600},{nota:'RE4',dur:600},
      {nota:'SI4',dur:400},{nota:'SI4',dur:200},{nota:'LA4',dur:600},{nota:'FA4',dur:600},{nota:'SOL4',dur:600},{nota:'FA4',dur:1200}
    ] },
    { nom: 'Oda a l\'Alegria', autor: 'Beethoven', notes: [
      {nota:'MI4',dur:400},{nota:'MI4',dur:400},{nota:'FA4',dur:400},{nota:'SOL4',dur:400},{nota:'SOL4',dur:400},{nota:'FA4',dur:400},{nota:'MI4',dur:400},{nota:'RE4',dur:400},
      {nota:'DO4',dur:400},{nota:'DO4',dur:400},{nota:'RE4',dur:400},{nota:'MI4',dur:400},{nota:'MI4',dur:600},{nota:'RE4',dur:200},{nota:'RE4',dur:800},
      {nota:'MI4',dur:400},{nota:'MI4',dur:400},{nota:'FA4',dur:400},{nota:'SOL4',dur:400},{nota:'SOL4',dur:400},{nota:'FA4',dur:400},{nota:'MI4',dur:400},{nota:'RE4',dur:400},
      {nota:'DO4',dur:400},{nota:'DO4',dur:400},{nota:'RE4',dur:400},{nota:'MI4',dur:400},{nota:'RE4',dur:600},{nota:'DO4',dur:200},{nota:'DO4',dur:800}
    ] }
  ];

  // DOM elements
  const connectPanel = document.getElementById('connectPanel');
  const mainPanel = document.getElementById('mainPanel');
  const connectBtn = document.getElementById('connectBtn');
  const disconnectBtn = document.getElementById('disconnectBtn');
  const backToSongsBtn = document.getElementById('backToSongsBtn');
  const songsContainer = document.getElementById('songsContainer');
  const playPauseBtn = document.getElementById('playPauseBtn');
  const resetSongBtn = document.getElementById('resetSongBtn');
  const currentNoteLabel = document.getElementById('currentNoteLabel');
  const progressCounter = document.getElementById('progressCounter');
  const progressFillSong = document.getElementById('progressFillSong');
  const instructionHint = document.getElementById('instructionHint');
  const visualKeyboardDiv = document.getElementById('visualKeyboard');
  const speedRange = document.getElementById('speedRange');
  const speedValue = document.getElementById('speedValue');
  const midiFileInput = document.getElementById('midiFileInput');
  const statusLed = document.getElementById('statusLed');
  const statusTextSpan = document.getElementById('statusText');

  // ---- UI Helper ----
  function renderVisualKeyboard(highlightNote = null) {
    visualKeyboardDiv.innerHTML = '';
    NOTES_BLANQUES.forEach(nota => {
      const keyDiv = document.createElement('div');
      keyDiv.className = 'virtual-key';
      keyDiv.textContent = nota.replace(/\d/, '');
      if (highlightNote === nota) keyDiv.classList.add('lit');
      visualKeyboardDiv.appendChild(keyDiv);
    });
  }

  function highlightLedByNote(nota) {
    const idx = NOTES_BLANQUES.indexOf(nota);
    const allKeys = document.querySelectorAll('.virtual-key');
    allKeys.forEach((k, i) => k.classList.remove('lit'));
    if (idx !== -1 && allKeys[idx]) allKeys[idx].classList.add('lit');
    currentLedIndex = idx;
  }

  function clearLedVisuals() {
    document.querySelectorAll('.virtual-key').forEach(k => k.classList.remove('lit'));
  }

  function updateProgress() {
    if (!seqNotes.length) { progressCounter.innerText = `0 / 0`; progressFillSong.style.width = '0%'; return; }
    progressCounter.innerText = `${currentIdx} / ${seqNotes.length}`;
    const percent = (currentIdx / seqNotes.length) * 100;
    progressFillSong.style.width = `${percent}%`;
  }

  function stopPlayback(resetIndex = true) {
    isPlaying = false;
    waitingForOk = false;
    if (resetIndex) { currentIdx = 0; updateProgress(); currentNoteLabel.textContent = '—'; clearLedVisuals(); }
    playPauseBtn.textContent = '▶';
    instructionHint.innerHTML = '⏸ Selecciona una cançó i prem ▶';
    playPauseBtn.classList.remove('primary-action');
  }

  async function sendNoteToESP(nota) {
    if (!btChar || !connected) { instructionHint.innerHTML = '⚠️ Sense Bluetooth'; return false; }
    try {
      const encoder = new TextEncoder();
      await btChar.writeValue(encoder.encode(nota + '\n'));
      return true;
    } catch(e) { console.warn(e); return false; }
  }

  async function advanceToNextNote() {
    if (!isPlaying) return;
    if (waitingForOk) return; // esperant confirmació
    if (currentIdx >= seqNotes.length) {
      // Cançó completada
      instructionHint.innerHTML = '🏆 Cançó superada! 🎉';
      currentNoteLabel.textContent = '✓';
      stopPlayback(true);
      return;
    }
    const currentNoteObj = seqNotes[currentIdx];
    const notaActual = currentNoteObj.nota;
    currentNoteLabel.textContent = notaActual;
    highlightLedByNote(notaActual);
    updateProgress();
    // enviar nota a l'ESP32 i esperar resposta
    const sent = await sendNoteToESP(notaActual);
    if (!sent) {
      instructionHint.innerHTML = '❌ Error enviant nota, revisa connexió';
      isPlaying = false;
      return;
    }
    waitingForOk = true;
    instructionHint.innerHTML = `🎹 Toca la tecla: ${notaActual} · esperant resposta...`;
  }

  // callback de BLE (rebre "OK" o "ERROR")
  function handleEspNotification(value) {
    const msg = value.trim();
    if (msg === "OK" && waitingForOk && isPlaying) {
      waitingForOk = false;
      instructionHint.innerHTML = '✅ Nota correcta!';
      currentIdx++;
      updateProgress();
      if (currentIdx >= seqNotes.length) {
        instructionHint.innerHTML = '✨ Cançó finalitzada! ✨';
        stopPlayback(true);
        clearLedVisuals();
        currentNoteLabel.textContent = '✔️';
      } else {
        setTimeout(() => { if (isPlaying && !waitingForOk) advanceToNextNote(); }, 180);
      }
    } else if (msg.startsWith("ERROR")) {
      waitingForOk = false;
      instructionHint.innerHTML = '❌ Nota incorrecta o temps esgotat, torna a intentar';
      const currentNota = (currentIdx < seqNotes.length) ? seqNotes[currentIdx].nota : '';
      highlightLedByNote(currentNota);
      setTimeout(() => {
        if (isPlaying && currentIdx < seqNotes.length && !waitingForOk) {
          instructionHint.innerHTML = `🎯 Torna a tocar: ${currentNota}`;
          sendNoteToESP(currentNota);
          waitingForOk = true;
        }
      }, 600);
    }
  }

  async function startSongPlayback() {
    if (!connected || !seqNotes.length) return;
    if (currentIdx >= seqNotes.length) currentIdx = 0;
    isPlaying = true;
    waitingForOk = false;
    playPauseBtn.textContent = '⏸';
    instructionHint.innerHTML = '🎵 Iniciant...';
    await advanceToNextNote();
  }

  function pauseSong() {
    isPlaying = false;
    waitingForOk = false;
    playPauseBtn.textContent = '▶';
    instructionHint.innerHTML = '⏸ Pausat · prem ▶ per reprendre';
  }

  function resetSong() {
    if (!seqNotes.length) return;
    const wasPlaying = isPlaying;
    if (wasPlaying) pauseSong();
    currentIdx = 0;
    waitingForOk = false;
    updateProgress();
    clearLedVisuals();
    currentNoteLabel.textContent = seqNotes.length ? seqNotes[0].nota : '—';
    if (wasPlaying) startSongPlayback();
    else { currentNoteLabel.textContent = seqNotes[0]?.nota || '—'; highlightLedByNote(seqNotes[0]?.nota); }
  }

  function selectSong(song) {
    if (isPlaying) pauseSong();
    currentSong = song;
    seqNotes = [...song.notes];
    currentIdx = 0;
    waitingForOk = false;
    updateProgress();
    if (seqNotes.length) {
      currentNoteLabel.textContent = seqNotes[0].nota;
      highlightLedByNote(seqNotes[0].nota);
    } else { currentNoteLabel.textContent = '—'; clearLedVisuals(); }
    playPauseBtn.disabled = false;
    resetSongBtn.disabled = false;
    instructionHint.innerHTML = '✅ Cançó seleccionada. Prem ▶ per començar';
    // actualitzar estil visual de la llista
    document.querySelectorAll('.song-card').forEach(card => card.classList.remove('selected'));
  }

  function renderSongs() {
    songsContainer.innerHTML = '';
    [...CANCONS_PRESET].forEach((song, idx) => {
      const div = document.createElement('div');
      div.className = 'song-card';
      if (currentSong === song) div.classList.add('selected');
      div.innerHTML = `
        <div class="song-info"><h4>${song.nom}</h4><p>${song.autor} · ${song.notes.length} notes</p></div>
        <div class="badge-notes">🎵</div>
      `;
      div.addEventListener('click', () => { selectSong(song); renderSongs(); });
      songsContainer.appendChild(div);
    });
  }

  function addMidiSong(nom, notesArray) {
    const newSong = { nom, autor: 'MIDI importat', notes: notesArray };
    CANCONS_PRESET.push(newSong);
    renderSongs();
    selectSong(newSong);
    renderSongs();
  }

  // Bluetooth
  async function connectBluetooth() {
    try {
      statusTextSpan.innerText = 'Connectant...';
      statusLed.classList.remove('connected');
      const device = await navigator.bluetooth.requestDevice({
        filters: [{ name: 'TeclatMusical' }],
        optionalServices: ['0000ffe0-0000-1000-8000-00805f9b34fb']
      });
      btDevice = device;
      device.addEventListener('gattserverdisconnected', () => { setDisconnected(); });
      const server = await device.gatt.connect();
      const service = await server.getPrimaryService('0000ffe0-0000-1000-8000-00805f9b34fb');
      btChar = await service.getCharacteristic('0000ffe1-0000-1000-8000-00805f9b34fb');
      await btChar.startNotifications();
      btChar.addEventListener('characteristicvaluechanged', (event) => {
        const val = new TextDecoder().decode(event.target.value);
        handleEspNotification(val);
      });
      connected = true;
      statusTextSpan.innerText = 'Connectat';
      statusLed.classList.add('connected');
      connectPanel.style.display = 'none';
      mainPanel.style.display = 'block';
      renderVisualKeyboard();
      renderSongs();
      if (seqNotes.length === 0 && CANCONS_PRESET.length) selectSong(CANCONS_PRESET[0]);
    } catch(e) {
      console.error(e);
      statusTextSpan.innerText = 'Error';
      statusLed.classList.remove('connected');
    }
  }

  function setDisconnected() {
    connected = false;
    btDevice = null; btChar = null;
    statusTextSpan.innerText = 'Desconnectat';
    statusLed.classList.remove('connected');
    connectPanel.style.display = 'block';
    mainPanel.style.display = 'none';
    if (isPlaying) stopPlayback(true);
    isPlaying = false;
    waitingForOk = false;
  }

  function disconnectPlaca() {
    if (btDevice && btDevice.gatt.connected) btDevice.gatt.disconnect();
    setDisconnected();
  }

  // Eventos UI
  connectBtn.addEventListener('click', connectBluetooth);
  disconnectBtn.addEventListener('click', disconnectPlaca);
  backToSongsBtn.addEventListener('click', () => { if (isPlaying) pauseSong(); renderSongs(); instructionHint.innerHTML = 'Selecciona una cançó'; });
  playPauseBtn.addEventListener('click', () => {
    if (!connected) { instructionHint.innerHTML = '🔌 Connecta la placa primer'; return; }
    if (!seqNotes.length) { instructionHint.innerHTML = '📀 Selecciona o puja una cançó'; return; }
    if (isPlaying) pauseSong();
    else startSongPlayback();
  });
  resetSongBtn.addEventListener('click', () => { if (seqNotes.length) resetSong(); });
  speedRange.addEventListener('input', (e) => { tempoMultiplier = parseFloat(e.target.value); speedValue.innerText = tempoMultiplier.toFixed(1)+'x'; });
  document.querySelector('.upload-zone')?.addEventListener('click', () => midiFileInput.click());
  midiFileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    MidiParser.parse(file, (midi) => {
      const track = midi.track[0] || midi.track[1];
      let tempoMicros = 500000;
      const tpb = midi.timeDivision;
      const notesRaw = [];
      track.event.forEach(ev => {
        if (ev.type === 255 && ev.metaType === 81) tempoMicros = ev.data;
        if (ev.type === 9 && ev.data[1] > 0) {
          const notaNom = MIDI_A_NOTA[ev.data[0]];
          if (notaNom) {
            const durMs = Math.round((ev.deltaTime / tpb) * (tempoMicros / 1000));
            notesRaw.push({ nota: notaNom, dur: Math.max(durMs, 200) });
          }
        }
      });
      if (notesRaw.length) addMidiSong(file.name.replace(/\.midi?$/i,''), notesRaw);
      else alert("No s'han trobat notes blanques en el MIDI");
    });
  });

  renderVisualKeyboard();
  // Inicial
</script>
</body>
</html>
