<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>TeclaLux Studio — Aprenentatge Interactiu</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-deep: #050507;
      --surface-elevated: #0c0c12;
      --surface-card: #12121c;
      --border-subtle: #22222e;
      --border-glow: #2e2e42;
      --green-primary: #10d48e;
      --green-glow: rgba(16, 212, 142, 0.4);
      --green-dim: rgba(16, 212, 142, 0.12);
      --amber-accent: #ffb347;
      --text-main: #f0f3fa;
      --text-muted: #8a8aa8;
      --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
      --font-mono: 'Space Mono', monospace;
    }

    body {
      background: var(--bg-deep);
      color: var(--text-main);
      font-family: var(--font-sans);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 30% 10%, rgba(16, 212, 142, 0.08), transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* app container */
    .app {
      max-width: 560px;
      width: 100%;
      margin: 0 auto;
      position: relative;
      z-index: 2;
    }

    /* pantalles */
    .screen {
      transition: opacity 0.3s ease, transform 0.2s ease;
    }

    .screen.hidden {
      display: none;
    }

    /* targetes premium */
    .lux-card {
      background: var(--surface-card);
      border: 1px solid var(--border-subtle);
      border-radius: 32px;
      backdrop-filter: blur(2px);
      box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.03);
      padding: 28px 24px;
      transition: all 0.2s;
    }

    .btn-lux {
      width: 100%;
      padding: 14px 20px;
      border-radius: 48px;
      font-weight: 600;
      font-size: 16px;
      border: none;
      cursor: pointer;
      font-family: var(--font-sans);
      transition: 0.2s;
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-main);
      border: 1px solid var(--border-subtle);
    }

    .btn-primary {
      background: var(--green-primary);
      color: #08080e;
      border: none;
      font-weight: 700;
      box-shadow: 0 4px 12px rgba(16, 212, 142, 0.3);
    }

    .btn-primary:hover {
      background: #0bc77e;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(16, 212, 142, 0.4);
    }

    .btn-outline {
      background: transparent;
      border: 1px solid var(--border-subtle);
    }

    .btn-outline:hover {
      border-color: var(--green-primary);
      color: var(--green-primary);
    }

    .btn-danger {
      border-color: #ff5e5e30;
      color: #ff9e8f;
    }
    .btn-danger:hover {
      border-color: #ff5e5e;
      color: #ffae9e;
    }

    /* barra estat BT */
    .bt-status-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface-elevated);
      border-radius: 60px;
      padding: 8px 18px;
      margin-bottom: 24px;
      border: 1px solid var(--border-subtle);
    }
    .bt-led {
      width: 10px;
      height: 10px;
      border-radius: 10px;
      background: #4a4a6a;
      transition: 0.2s;
    }
    .bt-led.connected {
      background: var(--green-primary);
      box-shadow: 0 0 8px var(--green-primary);
    }
    .bt-led.connecting {
      background: var(--amber-accent);
      animation: pulse 1s infinite;
    }
    @keyframes pulse {
      0% { opacity: 0.4; transform: scale(0.9);}
      100% { opacity: 1; transform: scale(1.2);}
    }

    /* llista cançons */
    .song-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin: 16px 0 20px;
      max-height: 340px;
      overflow-y: auto;
      padding-right: 4px;
    }
    .song-card {
      background: var(--surface-elevated);
      border-radius: 24px;
      padding: 14px 18px;
      border: 1px solid var(--border-subtle);
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .song-card:hover {
      border-color: var(--green-primary);
      background: var(--green-dim);
      transform: translateX(4px);
    }
    .song-card.selected {
      border-color: var(--green-primary);
      background: var(--green-dim);
      box-shadow: 0 0 0 1px var(--green-primary) inset;
    }
    .song-info h4 {
      font-weight: 600;
      font-size: 16px;
    }
    .song-info p {
      font-size: 12px;
      color: var(--text-muted);
      font-family: var(--font-mono);
      margin-top: 4px;
    }
    .upload-zone-modern {
      border: 1.5px dashed var(--border-subtle);
      border-radius: 28px;
      padding: 16px;
      text-align: center;
      transition: 0.2s;
      cursor: pointer;
      margin-top: 12px;
    }
    .upload-zone-modern:hover {
      border-color: var(--green-primary);
      background: var(--green-dim);
    }

    /* teclat visual (tira LED simulada) */
    .led-panel {
      background: var(--surface-elevated);
      border-radius: 28px;
      padding: 18px 12px;
      margin: 16px 0;
    }
    .led-strip-premium {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }
    .led-key {
      text-align: center;
      width: 44px;
    }
    .led-circle {
      width: 40px;
      height: 40px;
      background: #1e1e2c;
      border-radius: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-mono);
      font-size: 14px;
      font-weight: 600;
      color: var(--text-muted);
      border: 1px solid var(--border-subtle);
      transition: 0.1s;
      margin-bottom: 6px;
    }
    .led-circle.active {
      background: var(--green-primary);
      box-shadow: 0 0 18px var(--green-primary);
      color: #000;
      border-color: var(--green-primary);
      transform: scale(1.02);
    }
    .led-label-small {
      font-size: 10px;
      color: var(--text-muted);
      font-family: var(--font-mono);
    }

    .nota-hero {
      background: var(--surface-elevated);
      border-radius: 40px;
      padding: 18px 24px;
      text-align: center;
      margin: 20px 0;
    }
    .big-note {
      font-family: var(--font-mono);
      font-size: 48px;
      font-weight: 700;
      letter-spacing: 4px;
      color: var(--green-primary);
      text-shadow: 0 0 6px var(--green-glow);
    }

    .progress-track {
      background: var(--border-subtle);
      border-radius: 12px;
      height: 6px;
      overflow: hidden;
      margin: 16px 0;
    }
    .progress-fill-lux {
      background: var(--green-primary);
      width: 0%;
      height: 100%;
      transition: width 0.2s ease;
      border-radius: 12px;
    }

    .speed-row {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--surface-elevated);
      padding: 12px 18px;
      border-radius: 60px;
      margin-top: 12px;
    }
    input[type=range] {
      flex: 1;
      accent-color: var(--green-primary);
      height: 4px;
    }

    .bottom-actions {
      display: flex;
      gap: 12px;
      margin-top: 22px;
    }

    hr {
      border-color: var(--border-subtle);
      margin: 16px 0;
    }

    .badge-tecla {
      font-size: 12px;
      background: rgba(16,212,142,0.2);
      display: inline-block;
      padding: 2px 12px;
      border-radius: 40px;
      color: var(--green-primary);
    }
  </style>
</head>
<body>
<div class="app">

  <!-- PANTALLA 1: CONNEXIÓ -->
  <div id="screenConnect" class="screen lux-card" style="text-align: center;">
    <div style="margin-bottom: 28px;">
      <span style="font-size: 56px;">🎹</span>
      <h1 style="font-size: 28px; margin-top: 10px; letter-spacing: -0.5px;">TeclaLux<span style="color: var(--green-primary);"> Studio</span></h1>
      <p style="color: var(--text-muted); margin-top: 8px;">aprenentatge actiu · LED interactiu</p>
    </div>
    <div class="bt-status-bar" style="justify-content: center; background: var(--surface-card);">
      <div id="connLed" class="bt-led"></div>
      <span id="connStatusText" style="font-weight: 500;">Desconnectat</span>
    </div>
    <button id="mainConnectBtn" class="btn-lux btn-primary" style="margin-bottom: 12px;">🔗 Connectar TeclaLux</button>
    <p style="font-size: 12px; color: var(--text-muted); margin-top: 20px;">assegura't que l'ESP32 està encès<br>amb nom "TeclatMusical"</p>
  </div>

  <!-- PANTALLA 2: SELECCIÓ CANÇÓ / MIDI -->
  <div id="screenSongs" class="screen hidden lux-card">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px;">
      <div>
        <span class="badge-tecla">🎵 BIBLIOTECA</span>
        <h2 style="margin-top: 6px;">Tria la teva cançó</h2>
      </div>
      <button id="disconnectFromSongsBtn" class="btn-lux" style="width: auto; padding: 8px 16px; background: #1e1e2c;">🔌</button>
    </div>

    <div class="song-grid" id="songLibraryContainer"></div>

    <label class="upload-zone-modern" id="midiUploadLabel">
      <input type="file" id="midiFileInput" accept=".mid,.midi" style="display: none;">
      <span style="font-size: 28px;">📂</span><br>
      <span style="font-size: 13px;">Puja un fitxer <strong style="color: var(--green-primary);">MIDI</strong> propi</span>
    </label>

    <div class="bottom-actions">
      <button id="openPlayerBtn" class="btn-lux btn-primary" disabled>▶  Iniciar Pràctica</button>
      <button id="backToConnectFromSongs" class="btn-lux btn-outline">⤺ Desconnectar i tornar</button>
    </div>
    <p id="songSelectHint" style="font-size: 11px; color: var(--text-muted); margin-top: 14px; text-align: center;">* selecciona una cançó per activar el botó</p>
  </div>

  <!-- PANTALLA 3: PLAYER INTERACTIU (NOTES + VELOCITAT + LEDS) -->
  <div id="screenPlayer" class="screen hidden lux-card">
    <div style="display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap;">
      <div>
        <span class="badge-tecla">🎶 SESSIÓ ACTIVA</span>
        <h3 id="playerSongTitle" style="margin-top: 6px;">Cançó</h3>
      </div>
      <button id="exitToSongsBtn" class="btn-lux" style="width: auto; padding: 8px 16px; background: #1e1e2c;" title="Tornar a cançons">📁 Cançons</button>
    </div>

    <!-- LEDs simulats -->
    <div class="led-panel">
      <div class="led-strip-premium" id="ledVisualStrip"></div>
    </div>

    <!-- Nota actual + estat -->
    <div class="nota-hero">
      <div class="big-note" id="playerCurrentNote">—</div>
      <div id="playerStateMessage" style="font-size: 14px; font-weight: 400; margin-top: 6px; color: var(--amber-accent);">⏳ esperant resposta</div>
      <div class="progress-track"><div class="progress-fill-lux" id="playerProgressFill"></div></div>
      <div style="display: flex; justify-content: space-between; font-size: 12px; font-family: var(--font-mono);">
        <span id="playerNoteCounter">0 / 0</span>
        <span id="playerStatusBadge">🎯 mode aprenentatge</span>
      </div>
    </div>

    <!-- controls reproducció + velocitat -->
    <div style="display: flex; gap: 12px; justify-content: center;">
      <button id="playerPlayPauseBtn" class="btn-lux" style="width: 70px;">▶</button>
      <button id="playerResetBtn" class="btn-lux btn-outline">↺ Reiniciar</button>
    </div>

    <div class="speed-row">
      <span style="font-size: 13px;">⚡ velocitat</span>
      <input type="range" id="playerSpeedSlider" min="0.3" max="2.5" step="0.05" value="1.0">
      <span id="playerSpeedVal" style="font-family: monospace; min-width: 48px;">×1.00</span>
    </div>

    <div class="bottom-actions">
      <button id="disconnectFromPlayerBtn" class="btn-lux btn-danger" style="background: transparent;">🔌 Desconnectar placa</button>
      <button id="backToLibraryFromPlayer" class="btn-lux btn-outline">← Seleccionar una altra cançó</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/midi-parser-js@4.0.6/src/midi-parser.js"></script>
<script>
  // ---------- CONSTANTS GLOBALS ----------
  const NOTES_BLANQUES = ['DO4','RE4','MI4','FA4','SOL4','LA4','SI4','DO5','RE5','MI5','FA5','SOL5','LA5','SI5','DO6','RE6','MI6','FA6','SOL6','LA6','SI6','DO7'];
  const MIDI_BASE = {0:'DO',1:'DO#',2:'RE',3:'RE#',4:'MI',5:'FA',6:'FA#',7:'SOL',8:'SOL#',9:'LA',10:'LA#',11:'SI'};
  const BLANQUES_SET = new Set(['DO','RE','MI','FA','SOL','LA','SI']);
  const MIDI_A_NOTA = {};
  for (let m = 48; m <= 96; m++) {
    let nom = MIDI_BASE[m % 12];
    let oct = Math.floor(m / 12) - 1;
    if (BLANQUES_SET.has(nom)) {
      let full = nom + oct;
      if (NOTES_BLANQUES.includes(full)) MIDI_A_NOTA[m] = full;
    }
  }

  // estat global
  let btDevice = null;
  let btCharacteristic = null;
  let isConnected = false;

  let currentSong = null;          // { nom, autor, notes: [{nota,dur}] }
  let sequenceNotes = [];
  let currentNoteIndex = 0;
  let isPlaying = false;
  let waitingForESP = false;
  let playSpeed = 1.0;
  let currentLedIndex = -1;

  // presets
  let presetSongs = [
    { nom: "Cumpleaños Feliz", autor: "Tradicional", notes: [{nota:'DO4',dur:400},{nota:'DO4',dur:200},{nota:'RE4',dur:600},{nota:'DO4',dur:600},{nota:'FA4',dur:600},{nota:'MI4',dur:1200},{nota:'DO4',dur:400},{nota:'DO4',dur:200},{nota:'RE4',dur:600},{nota:'DO4',dur:600},{nota:'SOL4',dur:600},{nota:'FA4',dur:1200},{nota:'DO4',dur:400},{nota:'DO4',dur:200},{nota:'DO5',dur:600},{nota:'LA4',dur:600},{nota:'FA4',dur:600},{nota:'MI4',dur:600},{nota:'RE4',dur:600},{nota:'SI4',dur:400},{nota:'SI4',dur:200},{nota:'LA4',dur:600},{nota:'FA4',dur:600},{nota:'SOL4',dur:600},{nota:'FA4',dur:1200}] },
    { nom: "Oda a l'Alegria", autor: "Beethoven", notes: [{nota:'MI4',dur:400},{nota:'MI4',dur:400},{nota:'FA4',dur:400},{nota:'SOL4',dur:400},{nota:'SOL4',dur:400},{nota:'FA4',dur:400},{nota:'MI4',dur:400},{nota:'RE4',dur:400},{nota:'DO4',dur:400},{nota:'DO4',dur:400},{nota:'RE4',dur:400},{nota:'MI4',dur:400},{nota:'MI4',dur:600},{nota:'RE4',dur:200},{nota:'RE4',dur:800},{nota:'MI4',dur:400},{nota:'MI4',dur:400},{nota:'FA4',dur:400},{nota:'SOL4',dur:400},{nota:'SOL4',dur:400},{nota:'FA4',dur:400},{nota:'MI4',dur:400},{nota:'RE4',dur:400},{nota:'DO4',dur:400},{nota:'DO4',dur:400},{nota:'RE4',dur:400},{nota:'MI4',dur:400},{nota:'RE4',dur:600},{nota:'DO4',dur:200},{nota:'DO4',dur:800}] }
  ];

  let selectedSongId = null;

  // helpers UI
  function switchScreen(screenId) {
    document.getElementById('screenConnect').classList.add('hidden');
    document.getElementById('screenSongs').classList.add('hidden');
    document.getElementById('screenPlayer').classList.add('hidden');
    document.getElementById(screenId).classList.remove('hidden');
  }

  // crear LEDs visuals
  function buildLedVisuals() {
    const container = document.getElementById('ledVisualStrip');
    container.innerHTML = '';
    NOTES_BLANQUES.forEach((nota, idx) => {
      const divWrap = document.createElement('div');
      divWrap.className = 'led-key';
      divWrap.innerHTML = `<div class="led-circle" id="ledCircle${idx}">${nota.replace(/\d/g,'')}</div><div class="led-label-small">${nota}</div>`;
      container.appendChild(divWrap);
    });
  }
  function highlightLed(notaName) {
    const idx = NOTES_BLANQUES.indexOf(notaName);
    if (currentLedIndex !== -1) {
      const prev = document.getElementById(`ledCircle${currentLedIndex}`);
      if (prev) prev.classList.remove('active');
    }
    if (idx !== -1) {
      const newLed = document.getElementById(`ledCircle${idx}`);
      if (newLed) newLed.classList.add('active');
      currentLedIndex = idx;
    } else if (currentLedIndex !== -1) {
      currentLedIndex = -1;
    }
  }

  // enviar nota per BLE
  async function sendNoteToESP(nota) {
    if (!btCharacteristic || !isConnected) {
      console.warn("no BT");
      return false;
    }
    try {
      const encoder = new TextEncoder();
      await btCharacteristic.writeValue(encoder.encode(nota + "\n"));
      return true;
    } catch(e) { return false; }
  }

  // gestió de resposta OK des d'ESP32
  function setupNotifications() {
    if (!btCharacteristic) return;
    btCharacteristic.addEventListener('characteristicvaluechanged', (event) => {
      const val = new TextDecoder().decode(event.target.value);
      if (val === "OK" && waitingForESP && isPlaying) {
        waitingForESP = false;
        document.getElementById('playerStateMessage').innerHTML = '✅ encertada! avançant...';
        setTimeout(() => { if (!waitingForESP && isPlaying) nextNote(); }, 150);
      } else if (val.startsWith("ERROR") && waitingForESP) {
        document.getElementById('playerStateMessage').innerHTML = '❌ nota incorrecta o timeout, torna a tocar la mateixa nota';
        setTimeout(() => { if (waitingForESP) document.getElementById('playerStateMessage').innerHTML = '🎵 prem la nota correcta'; }, 1200);
      }
    });
  }

  async function displayCurrentNoteAndWait() {
    if (!isPlaying || currentNoteIndex >= sequenceNotes.length) {
      if (currentNoteIndex >= sequenceNotes.length && isPlaying) finishSong();
      return;
    }
    const { nota, dur } = sequenceNotes[currentNoteIndex];
    highlightLed(nota);
    document.getElementById('playerCurrentNote').innerText = nota;
    document.getElementById('playerNoteCounter').innerText = `${currentNoteIndex+1} / ${sequenceNotes.length}`;
    const prog = ((currentNoteIndex+1)/sequenceNotes.length)*100;
    document.getElementById('playerProgressFill').style.width = `${prog}%`;
    document.getElementById('playerStateMessage').innerHTML = '🎤 toca la nota al teclat físic...';
    waitingForESP = true;

    const success = await sendNoteToESP(nota);
    if (!success) {
      document.getElementById('playerStateMessage').innerHTML = '⚠️ error Bluetooth, pausa';
      isPlaying = false;
      waitingForESP = false;
      return;
    }
    // esperem callback OK. Timeout de seguretat per evitar bloqueig (6s)
    setTimeout(() => {
      if (waitingForESP && isPlaying) {
        waitingForESP = false;
        document.getElementById('playerStateMessage').innerHTML = '⏱️ timeout, reintentant nota...';
        setTimeout(() => { if (isPlaying && !waitingForESP) displayCurrentNoteAndWait(); }, 400);
      }
    }, 7000);
  }

  async function nextNote() {
    if (!isPlaying) return;
    currentNoteIndex++;
    if (currentNoteIndex < sequenceNotes.length) {
      await displayCurrentNoteAndWait();
    } else {
      finishSong();
    }
  }

  function finishSong() {
    isPlaying = false;
    waitingForESP = false;
    document.getElementById('playerStateMessage').innerHTML = '🏆 Cançó completada! 🎉';
    document.getElementById('playerPlayPauseBtn').innerHTML = '▶';
    if (currentLedIndex !== -1) {
      const oldLed = document.getElementById(`ledCircle${currentLedIndex}`);
      if (oldLed) oldLed.classList.remove('active');
      currentLedIndex = -1;
    }
  }

  function stopAndResetPlayerUI() {
    isPlaying = false;
    waitingForESP = false;
    currentNoteIndex = 0;
    if (currentLedIndex !== -1) {
      const oldLed = document.getElementById(`ledCircle${currentLedIndex}`);
      if (oldLed) oldLed.classList.remove('active');
      currentLedIndex = -1;
    }
    document.getElementById('playerCurrentNote').innerText = '—';
    document.getElementById('playerNoteCounter').innerText = sequenceNotes.length ? `0 / ${sequenceNotes.length}` : "0 / 0";
    document.getElementById('playerProgressFill').style.width = '0%';
    document.getElementById('playerStateMessage').innerHTML = '⏸ aturat. Prem ▶ per començar';
    document.getElementById('playerPlayPauseBtn').innerHTML = '▶';
  }

  async function startPractice() {
    if (!currentSong || !sequenceNotes.length) return;
    if (!isConnected || !btCharacteristic) {
      alert('🔌 necessites connexió Bluetooth activa. Torna a la pantalla principal.');
      switchScreen('screenConnect');
      return;
    }
    stopAndResetPlayerUI();
    currentNoteIndex = 0;
    isPlaying = true;
    waitingForESP = false;
    document.getElementById('playerPlayPauseBtn').innerHTML = '⏸';
    document.getElementById('playerSongTitle').innerText = currentSong.nom;
    await displayCurrentNoteAndWait();
  }

  function togglePlayPause() {
    if (!currentSong) return;
    if (!isPlaying) {
      startPractice();
    } else {
      isPlaying = false;
      waitingForESP = false;
      document.getElementById('playerPlayPauseBtn').innerHTML = '▶';
      document.getElementById('playerStateMessage').innerHTML = '⏸ pausa';
    }
  }

  function resetSong() {
    if (!currentSong) return;
    const wasPlaying = isPlaying;
    isPlaying = false;
    waitingForESP = false;
    currentNoteIndex = 0;
    stopAndResetPlayerUI();
    if (wasPlaying) {
      startPractice();
    }
  }

  function rebuildSongLibrary() {
    const container = document.getElementById('songLibraryContainer');
    container.innerHTML = '';
    const allSongs = [...presetSongs];
    allSongs.forEach((song, idx) => {
      const div = document.createElement('div');
      div.className = 'song-card';
      if (selectedSongId === idx) div.classList.add('selected');
      div.innerHTML = `<div class="song-info"><h4>${song.nom}</h4><p>${song.autor} · ${song.notes.length} notes</p></div><span style="font-size:22px;">${selectedSongId === idx ? '✓' : ''}</span>`;
      div.onclick = () => {
        selectedSongId = idx;
        currentSong = { ...song };
        sequenceNotes = [...song.notes];
        document.querySelectorAll('.song-card').forEach(c => c.classList.remove('selected'));
        div.classList.add('selected');
        document.getElementById('openPlayerBtn').disabled = false;
        document.getElementById('songSelectHint').innerText = `✅ "${song.nom}" preparada. Prem "Iniciar Pràctica"`;
      };
      container.appendChild(div);
    });
  }

  // MIDI
  function loadMidiFromFile(file) {
    MidiParser.parse(file, (midi) => {
      try {
        const track = midi.track[0] || midi.track[1];
        let tempoMicros = 500000;
        const tpb = midi.timeDivision || 480;
        const extracted = [];
        track.event.forEach(ev => {
          if (ev.type === 255 && ev.metaType === 81) tempoMicros = ev.data;
          if (ev.type === 9 && ev.data[1] > 0) {
            const notaNom = MIDI_A_NOTA[ev.data[0]];
            if (notaNom) {
              let durMs = Math.round((ev.deltaTime / tpb) * (tempoMicros / 1000));
              extracted.push({ nota: notaNom, dur: Math.max(durMs, 180) });
            }
          }
        });
        if (extracted.length === 0) throw new Error("sense notes blanques");
        const newSong = { nom: file.name.replace(/\.midi?$/i,''), autor: "MIDI import", notes: extracted };
        presetSongs.push(newSong);
        rebuildSongLibrary();
        selectedSongId = presetSongs.length-1;
        currentSong = newSong;
        sequenceNotes = [...extracted];
        document.getElementById('openPlayerBtn').disabled = false;
        document.getElementById('songSelectHint').innerHTML = `🎵 MIDI carregat: ${extracted.length} notes`;
      } catch(e) { alert("Error MIDI: " + e.message); }
    });
  }

  // BLUETOOTH CONNEXIÓ
  async function connectBluetooth() {
    try {
      const led = document.getElementById('connLed');
      const statusText = document.getElementById('connStatusText');
      led.className = 'bt-led connecting';
      statusText.innerText = 'Connectant...';
      const device = await navigator.bluetooth.requestDevice({ filters: [{ name: 'TeclatMusical' }], optionalServices: ['0000ffe0-0000-1000-8000-00805f9b34fb'] });
      btDevice = device;
      const server = await device.gatt.connect();
      const service = await server.getPrimaryService('0000ffe0-0000-1000-8000-00805f9b34fb');
      btCharacteristic = await service.getCharacteristic('0000ffe1-0000-1000-8000-00805f9b34fb');
      await btCharacteristic.startNotifications();
      setupNotifications();
      isConnected = true;
      led.className = 'bt-led connected';
      statusText.innerText = `Connectat (${device.name || 'TeclaLux'})`;
      // després d'èxit, anar a pantalla cançons
      switchScreen('screenSongs');
    } catch(e) {
      const led = document.getElementById('connLed');
      const statusText = document.getElementById('connStatusText');
      led.className = 'bt-led';
      statusText.innerText = 'Error connexió';
      alert('No s’ha pogut connectar: ' + e.message);
    }
  }

  function disconnectFull() {
    if (btDevice && btDevice.gatt.connected) btDevice.gatt.disconnect();
    isConnected = false;
    btCharacteristic = null;
    btDevice = null;
    const led = document.getElementById('connLed');
    const statusText = document.getElementById('connStatusText');
    if (led) { led.className = 'bt-led'; statusText.innerText = 'Desconnectat'; }
    if (isPlaying) isPlaying = false;
    waitingForESP = false;
    switchScreen('screenConnect');
  }

  // EVENTS
  window.onload = () => {
    buildLedVisuals();
    rebuildSongLibrary();
    document.getElementById('mainConnectBtn').onclick = connectBluetooth;
    document.getElementById('disconnectFromSongsBtn').onclick = disconnectFull;
    document.getElementById('backToConnectFromSongs').onclick = disconnectFull;
    document.getElementById('disconnectFromPlayerBtn').onclick = disconnectFull;
    document.getElementById('backToLibraryFromPlayer').onclick = () => { if (isPlaying) isPlaying=false; waitingForESP=false; switchScreen('screenSongs'); };
    document.getElementById('exitToSongsBtn').onclick = () => { if (isPlaying) isPlaying=false; waitingForESP=false; switchScreen('screenSongs'); };
    document.getElementById('openPlayerBtn').onclick = () => { if (currentSong && sequenceNotes.length) switchScreen('screenPlayer'); };
    document.getElementById('playerPlayPauseBtn').onclick = togglePlayPause;
    document.getElementById('playerResetBtn').onclick = resetSong;
    const speedSlider = document.getElementById('playerSpeedSlider');
    const speedVal = document.getElementById('playerSpeedVal');
    speedSlider.addEventListener('input', (e) => { playSpeed = parseFloat(e.target.value); speedVal.innerText = `×${playSpeed.toFixed(2)}`; });
    document.getElementById('midiFileInput').addEventListener('change', (e) => { if(e.target.files[0]) loadMidiFromFile(e.target.files[0]); e.target.value=''; });
    document.getElementById('midiUploadLabel').addEventListener('click', () => document.getElementById('midiFileInput').click());
  };
</script>
</body>
