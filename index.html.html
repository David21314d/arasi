<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teclat Musical — Mode Aprenentatge</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c28;
    --border: #2a2a3d;
    --green: #00e676;
    --green-dim: #00e67622;
    --red: #ff4444;
    --red-dim: #ff444422;
    --amber: #ffaa00;
    --text: #e8e8f0;
    --text-dim: #6b6b88;
    --font-mono: 'Space Mono', monospace;
    --font-body: 'DM Sans', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    padding: 24px 16px 48px;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle, #2a2a3d 1px, transparent 1px);
    background-size: 32px 32px;
    opacity: 0.3;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 480px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  header {
    text-align: center;
    margin-bottom: 32px;
    padding-top: 12px;
  }

  .logo {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }

  .logo-icon {
    width: 36px;
    height: 36px;
    background: var(--green);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  h1 {
    font-family: var(--font-mono);
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--text);
  }

  .subtitle {
    font-size: 13px;
    color: var(--text-dim);
    font-family: var(--font-mono);
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 16px;
  }

  .card-title {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-title::before {
    content: '';
    width: 3px;
    height: 12px;
    background: var(--green);
    border-radius: 2px;
  }

  .btn {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.5px;
  }

  .btn-green {
    background: var(--green);
    color: #000;
  }

  .btn-green:hover { opacity: 0.85; transform: translateY(-1px); }
  .btn-green:active { transform: translateY(0); }

  .btn-outline {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
  }

  .btn-outline:hover { border-color: var(--green); color: var(--green); }

  .btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
    transform: none !important;
  }

  .bt-status {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    border-radius: 10px;
    background: var(--surface2);
    margin-bottom: 14px;
    font-size: 13px;
  }

  .bt-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--text-dim);
    flex-shrink: 0;
    transition: background 0.3s;
  }

  .bt-dot.connected { background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 2s infinite; }
  .bt-dot.connecting { background: var(--amber); animation: pulse 0.8s infinite; }
  .bt-dot.error { background: var(--red); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .song-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 14px;
  }

  .song-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface2);
    cursor: pointer;
    transition: all 0.15s;
    text-align: left;
  }

  .song-item:hover { border-color: var(--green); }

  .song-item.selected {
    border-color: var(--green);
    background: var(--green-dim);
  }

  .song-num {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-dim);
    width: 20px;
    flex-shrink: 0;
  }

  .song-item.selected .song-num { color: var(--green); }

  .song-info { flex: 1; }

  .song-name {
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 2px;
  }

  .song-meta {
    font-size: 11px;
    color: var(--text-dim);
    font-family: var(--font-mono);
  }

  .song-check {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    flex-shrink: 0;
    transition: all 0.15s;
  }

  .song-item.selected .song-check {
    background: var(--green);
    border-color: var(--green);
    color: #000;
  }

  .upload-zone {
    border: 1.5px dashed var(--border);
    border-radius: 10px;
    padding: 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
    margin-bottom: 14px;
  }

  .upload-zone:hover { border-color: var(--green); background: var(--green-dim); }

  .upload-zone input { display: none; }

  .upload-icon { font-size: 24px; margin-bottom: 6px; }

  .upload-text { font-size: 13px; color: var(--text-dim); }
  .upload-text span { color: var(--green); }

  .controls {
    display: grid;
    grid-template-columns: 1fr 2fr 1fr;
    gap: 8px;
    margin-bottom: 14px;
  }

  .btn-control {
    padding: 12px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: 18px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .btn-control:hover { border-color: var(--green); color: var(--green); }
  .btn-control.playing { border-color: var(--green); color: var(--green); background: var(--green-dim); }
  .btn-control:disabled { opacity: 0.3; cursor: not-allowed; }

  .nota-actual {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px;
    background: var(--surface2);
    border-radius: 10px;
    margin-bottom: 8px;
  }

  .nota-nom {
    font-family: var(--font-mono);
    font-size: 28px;
    font-weight: 700;
    color: var(--green);
    letter-spacing: -1px;
  }

  .nota-info {
    text-align: right;
  }

  .nota-label {
    font-size: 11px;
    color: var(--text-dim);
    font-family: var(--font-mono);
    display: block;
  }

  .nota-idx {
    font-family: var(--font-mono);
    font-size: 14px;
    color: var(--text);
  }

  .progress-bar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--green);
    border-radius: 2px;
    transition: width 0.3s;
    width: 0%;
  }

  .speed-control {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: var(--text-dim);
  }

  .speed-control input[type=range] {
    flex: 1;
    accent-color: var(--green);
    height: 3px;
  }

  .speed-val {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--green);
    min-width: 36px;
    text-align: right;
  }

  .led-strip {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    padding: 14px;
    background: var(--surface2);
    border-radius: 10px;
    justify-content: center;
  }

  .led {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--border);
    transition: all 0.2s;
    position: relative;
  }

  .led.on {
    background: var(--green);
    box-shadow: 0 0 10px var(--green), 0 0 20px var(--green-dim);
  }

  .led-label {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--text-dim);
    text-align: center;
    margin-top: 4px;
  }

  .led-wrap { text-align: center; }

  .log {
    background: var(--surface2);
    border-radius: 10px;
    padding: 12px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-dim);
    height: 80px;
    overflow-y: auto;
    line-height: 1.6;
  }

  .log-line { margin-bottom: 2px; }
  .log-line.ok { color: var(--green); }
  .log-line.err { color: var(--red); }
  .log-line.info { color: var(--amber); }
  .log-line.waiting { color: var(--amber); font-style: italic; }

  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 20px;
    font-family: var(--font-mono);
    font-size: 10px;
    background: var(--green-dim);
    color: var(--green);
    border: 1px solid var(--green);
  }

  .mode-badge {
    background: var(--amber);
    color: #000;
    border-color: var(--amber);
    margin-left: 8px;
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo">
      <div class="logo-icon">🎹</div>
      <h1>TECLAT LED <span class="badge mode-badge">MODE APRENENTATGE</span></h1>
    </div>
    <p class="subtitle">Prem la nota correcta per avançar</p>
  </header>

  <!-- BLUETOOTH -->
  <div class="card">
    <div class="card-title">Connexió Bluetooth</div>
    <div class="bt-status">
      <div class="bt-dot" id="btDot"></div>
      <span id="btText" style="flex:1">Desconnectat</span>
      <span class="badge" id="btBadge" style="display:none">CONNECTAT</span>
    </div>
    <button class="btn btn-green" id="btnBT" onclick="toggleBluetooth()">
      Connectar Bluetooth
    </button>
  </div>

  <!-- CANÇONS -->
  <div class="card">
    <div class="card-title">Tria una cançó</div>
    <div class="song-list" id="songList"></div>

    <label class="upload-zone" id="uploadZone">
      <input type="file" id="midiFile" accept=".mid,.midi" onchange="carregarMidi(event)">
      <div class="upload-icon">🎵</div>
      <div class="upload-text">Puja un arxiu <span>MIDI</span> propi</div>
    </label>
  </div>

  <!-- REPRODUCCIÓ -->
  <div class="card">
    <div class="card-title">Reproducció</div>

    <div class="nota-actual">
      <div class="nota-nom" id="notaActual">—</div>
      <div class="nota-info">
        <span class="nota-label" id="estatLabel">⏳ ESPERANT RESPOSTA</span>
        <span class="nota-idx" id="notaIdx">0 / 0</span>
      </div>
    </div>

    <div class="progress-bar" style="margin-bottom:14px">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <div class="controls">
      <button class="btn-control" id="btnStop" onclick="stopReproduir()" disabled title="Atura">⏹</button>
      <button class="btn-control" id="btnPlay" onclick="togglePlay()" disabled title="Reproduir">▶</button>
      <button class="btn-control" onclick="reiniciar()" title="Reiniciar">↺</button>
    </div>

    <div class="speed-control">
      <span>Velocitat</span>
      <input type="range" min="0.25" max="3" step="0.25" value="1" id="speedSlider" oninput="canviarVelocitat(this.value)">
      <span class="speed-val" id="speedVal">×1.0</span>
    </div>
  </div>

  <!-- LED STRIP VISUAL -->
  <div class="card">
    <div class="card-title">Tira LED (simulació)</div>
    <div class="led-strip" id="ledStrip"></div>
    <p style="font-size: 10px; color: var(--text-dim); margin-top: 8px; text-align: center;">
      💡 Els LEDs físics s'encenen a l'ESP32
    </p>
  </div>

  <!-- LOG -->
  <div class="card">
    <div class="card-title">Registre</div>
    <div class="log" id="log"></div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/midi-parser-js@4.0.6/src/midi-parser.js"></script>

<script>
// ── Notes (només blanques) ──────────────────────────────
const NOTES_BLANQUES = [
  'DO4','RE4','MI4','FA4','SOL4','LA4','SI4',
  'DO5','RE5','MI5','FA5','SOL5','LA5','SI5',
  'DO6','RE6','MI6','FA6','SOL6','LA6','SI6',
  'DO7'
];

const MIDI_BASE = {
  0:'DO',1:'DO#',2:'RE',3:'RE#',4:'MI',5:'FA',
  6:'FA#',7:'SOL',8:'SOL#',9:'LA',10:'LA#',11:'SI'
};
const BLANQUES_SET = new Set(['DO','RE','MI','FA','SOL','LA','SI']);

const MIDI_A_NOTA = {};
for (let midi = 48; midi <= 96; midi++) {
  const nom = MIDI_BASE[midi % 12];
  const octava = Math.floor(midi / 12) - 1;
  if (BLANQUES_SET.has(nom)) {
    const notaCompleta = nom + octava;
    if (NOTES_BLANQUES.includes(notaCompleta)) {
      MIDI_A_NOTA[midi] = notaCompleta;
    }
  }
}

// ── Estat ────────────────────────────────────────────────
let btDevice = null;
let btChar = null;
let cançoActual = null;
let notesSeq = [];
let indexActual = 0;
let reproduint = false;
let esperantResposta = false;      // ← NOU: esperant que l'ESP32 respongui "OK"
let velocitat = 1.0;
let ledActual = -1;

// ── Cançons predefinides ─────────────────────────────────
const CANCONS_PRESET = [
  {
    nom: 'Cumpleaños Feliz',
    autor: 'Tradicional',
    notes: [
      {nota:'DO4',dur:400},{nota:'DO4',dur:200},{nota:'RE4',dur:600},
      {nota:'DO4',dur:600},{nota:'FA4',dur:600},{nota:'MI4',dur:1200},
      {nota:'DO4',dur:400},{nota:'DO4',dur:200},{nota:'RE4',dur:600},
      {nota:'DO4',dur:600},{nota:'SOL4',dur:600},{nota:'FA4',dur:1200},
      {nota:'DO4',dur:400},{nota:'DO4',dur:200},{nota:'DO5',dur:600},
      {nota:'LA4',dur:600},{nota:'FA4',dur:600},{nota:'MI4',dur:600},{nota:'RE4',dur:600},
      {nota:'SI4',dur:400},{nota:'SI4',dur:200},{nota:'LA4',dur:600},
      {nota:'FA4',dur:600},{nota:'SOL4',dur:600},{nota:'FA4',dur:1200},
    ]
  },
  {
    nom: 'Oda a l\'Alegria',
    autor: 'Beethoven',
    notes: [
      {nota:'MI4',dur:400},{nota:'MI4',dur:400},{nota:'FA4',dur:400},{nota:'SOL4',dur:400},
      {nota:'SOL4',dur:400},{nota:'FA4',dur:400},{nota:'MI4',dur:400},{nota:'RE4',dur:400},
      {nota:'DO4',dur:400},{nota:'DO4',dur:400},{nota:'RE4',dur:400},{nota:'MI4',dur:400},
      {nota:'MI4',dur:600},{nota:'RE4',dur:200},{nota:'RE4',dur:800},
      {nota:'MI4',dur:400},{nota:'MI4',dur:400},{nota:'FA4',dur:400},{nota:'SOL4',dur:400},
      {nota:'SOL4',dur:400},{nota:'FA4',dur:400},{nota:'MI4',dur:400},{nota:'RE4',dur:400},
      {nota:'DO4',dur:400},{nota:'DO4',dur:400},{nota:'RE4',dur:400},{nota:'MI4',dur:400},
      {nota:'RE4',dur:600},{nota:'DO4',dur:200},{nota:'DO4',dur:800},
    ]
  }
];

// ── Inicialitzar UI ──────────────────────────────────────
function init() {
  const strip = document.getElementById('ledStrip');
  NOTES_BLANQUES.forEach((nota, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'led-wrap';
    wrap.innerHTML = `<div class="led" id="led${i}"></div><div class="led-label">${nota.replace(/\d/,'')}</div>`;
    strip.appendChild(wrap);
  });

  const list = document.getElementById('songList');
  CANCONS_PRESET.forEach((c, i) => {
    const el = document.createElement('div');
    el.className = 'song-item';
    el.id = `song${i}`;
    el.onclick = () => seleccionarCanco(i);
    el.innerHTML = `
      <span class="song-num">0${i+1}</span>
      <div class="song-info">
        <div class="song-name">${c.nom}</div>
        <div class="song-meta">${c.autor} · ${c.notes.length} notes</div>
      </div>
      <div class="song-check" id="check${i}">✓</div>`;
    list.appendChild(el);
  });

  log('🎹 Mode aprenentatge actiu! Connecta el Bluetooth i selecciona una cançó.', 'info');
}

// ── Seleccionar cançó ────────────────────────────────────
function seleccionarCanco(idx) {
  if (reproduint) stopReproduir();
  document.querySelectorAll('.song-item').forEach(el => el.classList.remove('selected'));
  document.getElementById(`song${idx}`).classList.add('selected');
  cançoActual = CANCONS_PRESET[idx];
  notesSeq = [...cançoActual.notes];
  indexActual = 0;
  esperantResposta = false;
  actualitzarUI();
  document.getElementById('btnPlay').disabled = false;
  document.getElementById('btnStop').disabled = false;
  log(`🎵 Cançó seleccionada: ${cançoActual.nom} (${notesSeq.length} notes)`, 'ok');
}

// ── Carregar MIDI ─────────────────────────────────────────
function carregarMidi(event) {
  const file = event.target.files[0];
  if (!file) return;
  log(`📁 Carregant MIDI: ${file.name}...`, 'info');

  MidiParser.parse(file, (midi) => {
    try {
      const notes = [];
      const track = midi.track[0] || midi.track[1];
      let tempoMicros = 500000;
      const tpb = midi.timeDivision;

      track.event.forEach(ev => {
        if (ev.type === 255 && ev.metaType === 81) {
          tempoMicros = ev.data;
        }
        if (ev.type === 9 && ev.data[1] > 0) {
          const notaNom = MIDI_A_NOTA[ev.data[0]];
          if (notaNom) {
            const durMs = Math.round((ev.deltaTime / tpb) * (tempoMicros / 1000));
            notes.push({ nota: notaNom, dur: Math.max(durMs, 200) });
          }
        }
      });

      if (notes.length === 0) {
        log('❌ No s\'han trobat notes blanques en aquest MIDI.', 'err');
        return;
      }

      if (reproduint) stopReproduir();
      const nom = file.name.replace('.mid','').replace('.midi','');
      const idx = CANCONS_PRESET.length;
      CANCONS_PRESET.push({ nom, autor: 'MIDI importat', notes });

      const list = document.getElementById('songList');
      const el = document.createElement('div');
      el.className = 'song-item';
      el.id = `song${idx}`;
      el.onclick = () => seleccionarCanco(idx);
      el.innerHTML = `
        <span class="song-num">0${idx+1}</span>
        <div class="song-info">
          <div class="song-name">${nom}</div>
          <div class="song-meta">MIDI importat · ${notes.length} notes</div>
        </div>
        <div class="song-check" id="check${idx}">✓</div>`;
      list.appendChild(el);

      seleccionarCanco(idx);
      log(`✅ MIDI carregat: ${notes.length} notes trobades!`, 'ok');
    } catch(e) {
      log('❌ Error llegint el MIDI: ' + e.message, 'err');
    }
  });
}

// ── Bluetooth ────────────────────────────────────────────
async function toggleBluetooth() {
  if (btDevice && btDevice.gatt.connected) {
    btDevice.gatt.disconnect();
    setBTEstat('desconnectat');
    return;
  }

  try {
    setBTEstat('connectant');
    log('🔍 Buscant dispositiu "TeclatMusical"...', 'info');

    btDevice = await navigator.bluetooth.requestDevice({
      filters: [{ name: 'TeclatMusical' }],
      optionalServices: ['0000ffe0-0000-1000-8000-00805f9b34fb']
    });

    btDevice.addEventListener('gattserverdisconnected', () => {
      setBTEstat('desconnectat');
      log('🔌 Bluetooth desconnectat.', 'err');
      esperantResposta = false;
    });

    const server = await btDevice.gatt.connect();
    const service = await server.getPrimaryService('0000ffe0-0000-1000-8000-00805f9b34fb');
    btChar = await service.getCharacteristic('0000ffe1-0000-1000-8000-00805f9b34fb');
    
    // ⭐ IMPORTANT: Activar notificacions per rebre "OK" de l'ESP32
    await btChar.startNotifications();
    btChar.addEventListener('characteristicvaluechanged', (event) => {
      const value = new TextDecoder().decode(event.target.value);
      if (value === "OK") {
        console.log("📥 Rebuda confirmació OK de l'ESP32!");
        log('🎉 Nota encertada! Continuem...', 'ok');
        esperantResposta = false;
        document.getElementById('estatLabel').textContent = '✅ NOTA ENCERTADA!';
        setTimeout(() => {
          if (reproduint && !esperantResposta) {
            seguent();
          }
        }, 300);
      } else if (value.startsWith("ERROR")) {
        log('❌ L\'ESP32 ha detectat un error (nota incorrecta o timeout)', 'err');
        document.getElementById('estatLabel').textContent = '❌ ERROR! Torna a intentar';
        setTimeout(() => {
          if (esperantResposta) {
            document.getElementById('estatLabel').textContent = '⏳ ESPERANT RESPOSTA...';
          }
        }, 1500);
      }
    });

    setBTEstat('connectat');
    log('✅ Connectat a TeclatMusical! Mode aprenentatge actiu.', 'ok');
  } catch(e) {
    setBTEstat('error');
    log('❌ Error Bluetooth: ' + e.message, 'err');
  }
}

function setBTEstat(estat) {
  const dot = document.getElementById('btDot');
  const text = document.getElementById('btText');
  const badge = document.getElementById('btBadge');
  const btn = document.getElementById('btnBT');

  dot.className = 'bt-dot';
  badge.style.display = 'none';

  if (estat === 'connectat') {
    dot.classList.add('connected');
    text.textContent = btDevice ? btDevice.name : 'TeclatMusical';
    badge.style.display = 'inline-block';
    btn.textContent = 'Desconnectar';
  } else if (estat === 'connectant') {
    dot.classList.add('connecting');
    text.textContent = 'Connectant...';
    btn.textContent = 'Cancel·lar';
  } else if (estat === 'error') {
    dot.classList.add('error');
    text.textContent = 'Error de connexió';
    btn.textContent = 'Tornar a intentar';
  } else {
    text.textContent = 'Desconnectat';
    btn.textContent = 'Connectar Bluetooth';
  }
}

// ── Enviar nota per BT ───────────────────────────────────
async function enviarNota(nota) {
  if (!btChar || !btDevice?.gatt?.connected) {
    log('⚠️ No hi ha connexió Bluetooth activa', 'err');
    return false;
  }
  try {
    const encoder = new TextEncoder();
    await btChar.writeValue(encoder.encode(nota + '\n'));
    log(`📤 Enviada nota: ${nota}`, 'info');
    return true;
  } catch(e) {
    log('❌ Error enviant nota: ' + e.message, 'err');
    return false;
  }
}

// ── Reproducció (MODE APRENENTATGE) ──────────────────────
function togglePlay() {
  if (reproduint) {
    pausar();
  } else {
    reproduir();
  }
}

async function reproduir() {
  if (!notesSeq || notesSeq.length === 0) {
    log('⚠️ No hi ha cap cançó seleccionada', 'err');
    return;
  }
  if (!btChar || !btDevice?.gatt?.connected) {
    log('⚠️ Connecta\'t al Bluetooth primer', 'err');
    return;
  }
  
  reproduint = true;
  esperantResposta = false;
  document.getElementById('btnPlay').textContent = '⏸';
  document.getElementById('btnPlay').classList.add('playing');
  
  // Començar amb la primera nota
  await mostrarNotaActual();
}

async function mostrarNotaActual() {
  if (!reproduint || indexActual >= notesSeq.length) {
    if (indexActual >= notesSeq.length) {
      log('🏁 Cançó finalitzada! 🎉', 'ok');
      stopReproduir();
    }
    return;
  }

  const { nota, dur } = notesSeq[indexActual];
  const ledIdx = NOTES_BLANQUES.indexOf(nota);

  // Actualitza LED visual (simulació)
  if (ledActual >= 0) document.getElementById(`led${ledActual}`).classList.remove('on');
  if (ledIdx >= 0) {
    document.getElementById(`led${ledIdx}`).classList.add('on');
    ledActual = ledIdx;
  }

  // Actualitza UI
  document.getElementById('notaActual').textContent = nota;
  document.getElementById('notaIdx').textContent = `${indexActual + 1} / ${notesSeq.length}`;
  document.getElementById('progressFill').style.width = `${((indexActual + 1) / notesSeq.length) * 100}%`;
  document.getElementById('estatLabel').textContent = '⏳ ESPERANT RESPOSTA...';

  // Envia la nota a l'ESP32 i espera confirmació
  log(`🎵 Nota actual: ${nota} (esperant que la toquis...)`, 'waiting');
  const enviat = await enviarNota(nota);
  
  if (!enviat) {
    log('⚠️ No s\'ha pogut enviar la nota. Comprova la connexió.', 'err');
    pausar();
    return;
  }
  
  // Entrem en mode espera
  esperantResposta = true;
  
  // No avancem automàticament! Esperarem que l'ESP32 ens enviï "OK"
  // Quan arribi "OK", es cridarà seguent() des del callback
}

// Aquesta funció la crida el callback de BLE quan rep "OK"
async function seguent() {
  if (!reproduint) return;
  if (esperantResposta) {
    // Encara estem esperant, però l'OK ja ha arribat
    esperantResposta = false;
  }
  
  indexActual++;
  
  if (indexActual >= notesSeq.length) {
    log('🏆 Cançó completada! 🎉', 'ok');
    stopReproduir();
  } else {
    // Mostrar la següent nota
    await mostrarNotaActual();
  }
}

function pausar() {
  reproduint = false;
  esperantResposta = false;
  document.getElementById('btnPlay').textContent = '▶';
  document.getElementById('btnPlay').classList.remove('playing');
  document.getElementById('estatLabel').textContent = '⏸ PAUSAT';
  log('⏸ Reproducció pausada.', 'info');
}

function stopReproduir() {
  reproduint = false;
  esperantResposta = false;
  if (timerReproduir) clearTimeout(timerReproduir);
  indexActual = 0;
  ledActual = -1;
  document.querySelectorAll('.led').forEach(l => l.classList.remove('on'));
  document.getElementById('btnPlay').textContent = '▶';
  document.getElementById('btnPlay').classList.remove('playing');
  document.getElementById('notaActual').textContent = '—';
  document.getElementById('notaIdx').textContent = '0 / 0';
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('estatLabel').textContent = '⏹ ATURAT';
  if (notesSeq.length > 0) {
    document.getElementById('notaIdx').textContent = `0 / ${notesSeq.length}`;
  }
}

function reiniciar() {
  const estavaReproduint = reproduint;
  stopReproduir();
  if (estavaReproduint && notesSeq.length > 0) {
    setTimeout(() => reproduir(), 200);
  }
}

function canviarVelocitat(val) {
  velocitat = parseFloat(val);
  document.getElementById('speedVal').textContent = `×${velocitat.toFixed(2)}`;
  // Nota: La velocitat només afecta la duració de la nota a la web,
  // però l'ESP32 controla el temps d'espera real.
}

function actualitzarUI() {
  document.getElementById('notaActual').textContent = '—';
  if (notesSeq && notesSeq.length) {
    document.getElementById('notaIdx').textContent = `0 / ${notesSeq.length}`;
    document.getElementById('progressFill').style.width = '0%';
  }
}

// ── Log ──────────────────────────────────────────────────
let timerReproduir = null; // Per compatibilitat

function log(msg, tipus = '') {
  const logEl = document.getElementById('log');
  const line = document.createElement('div');
  line.className = `log-line ${tipus}`;
  const hora = new Date().toLocaleTimeString('ca', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  line.textContent = `[${hora}] ${msg}`;
  logEl.appendChild(line);
  logEl.scrollTop = logEl.scrollHeight;
}

init();
</script>
